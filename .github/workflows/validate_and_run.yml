name: Run Scripts

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  # Run every 6 hours.
  schedule:
    - cron: "42 */6 * * *"

env:
  # Automatically set DRY_RUN=true for pull requests, otherwise false
  DRY_RUN: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
  WET_RUN: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}
  RUN_MODE: ${{ github.event_name == 'pull_request' && 'lightweight' || 'full' }}

jobs:
  validate-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dolt
        run: |
          sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Pyright check
        run: uv run pyright .

      - name: Pytest
        run: uv run pytest tests/

      - name: Validate SQL schemas
        run: |
          uv run src/polymarket_data_dolthub_jobs/generate_sql_schemas.py
          
          # Assert that the generated SQL schemas match the committed ones.
          test -z "$(git status --porcelain)"

  run-and-update-dolt:
    runs-on: ubuntu-latest
    needs: validate-job
    steps:
      - uses: actions/checkout@v6

      - name: Install dolt
        run: |
          sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | sudo bash'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync

      - name: Run data pipeline
        run: uv run src/polymarket_data_dolthub_jobs/pipeline.py --run-mode ${{ env.RUN_MODE }}

      - name: Print working directory
        run: |
          echo "PWD: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"

      - name: Dolt Import
        # https://github.com/RecRanger/dolt-action (maintained)
        # https://github.com/dolthub/dolt-action (archived)
        uses: RecRanger/dolt-action@v1
        id: 'dolt_import'
        with:
          remote: recranger/polymarket-data
          dolthub_credential: ${{ secrets.DOLTHUB_CREDENTIAL }}
          branch: 'main'
          commit_message: 'Update tables from GitHub Actions workflow'
          # commit_user_name: RecRanger
          # commit_user_email: recranger+dolthub@proton.me
          # commit_author: RecRanger
          push: ${{ env.WET_RUN }}
          before: |
            dolt version
            echo
            dolt table import -u bronze_gamma_events    $GITHUB_WORKSPACE/out/dolt_tables/bronze_gamma_events.parquet
            echo
            dolt table import -u bronze_gamma_markets   $GITHUB_WORKSPACE/out/dolt_tables/bronze_gamma_markets.parquet
            echo
            dolt table import -u silver_market_outcomes $GITHUB_WORKSPACE/out/dolt_tables/silver_market_outcomes.parquet
