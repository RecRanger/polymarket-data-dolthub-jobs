name: Run Scripts

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  # Run every 2 days at 12:20 PM UTC.
  schedule:
    - cron: "20 12 */2 * *"

env:
  # Automatically set DRY_RUN=true for pull requests, otherwise false
  DRY_RUN: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
  WET_RUN: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}

jobs:
  validate-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Pyright check
        run: uv run pyright .

      - name: Pytest
        run: uv run pytest tests/

  run-and-update-dolt:
    runs-on: ubuntu-latest
    needs: validate-job
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync

      - name: Run data pipeline
        run: uv run src/polymarket_data_dolthub_jobs/pipeline.py

      - name: Print working directory
        run: |
          echo "PWD: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"

      - name: Dolt Import
        # https://github.com/dolthub/dolt-action
        uses: RecRanger/dolt-action@main
        id: 'dolt_import'
        with:
          remote: recranger/polymarket-data
          dolthub_credential: ${{ secrets.DOLTHUB_CREDENTIAL }}
          branch: 'main'
          commit_message: 'Update tables from GitHub Actions workflow'
          # commit_user_name: RecRanger
          # commit_user_email: recranger+dolthub@proton.me
          # commit_author: RecRanger
          push: ${{ env.WET_RUN }}
          before: |
            dolt table import -u bronze_gamma_markets $GITHUB_WORKSPACE/out/bronze_gamma_markets/bronze_gamma_markets.csv
            dolt table import -u silver_market_outcomes $GITHUB_WORKSPACE/out/silver_market_outcomes/silver_market_outcomes.csv
